<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Understand Everything · Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --root:#0a0a0a; --surface:#111111; --elevated:#1a1a1a; --panel:#141414;
    --accent:#d4a574; --accent-bright:#e8c49a; --warn:#d4a030;
    --text-1:#f5f0eb; --text-2:#a39787; --text-3:#6b5f53;
    --border-subtle:rgba(212,165,116,.12); --border-medium:rgba(212,165,116,.25);
    --glass:rgba(20,20,20,.8);
    --lane-fe:#7ba4c9; --lane-be:#5a9e6f; --lane-db:#c9a06c;
    --up:#4a7c9b;
    --font-serif:'DM Serif Display',Georgia,serif;
    --font-mono:'JetBrains Mono',monospace;
    --font-sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-sans);background:var(--root);color:var(--text-1);-webkit-font-smoothing:antialiased;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;opacity:.03;pointer-events:none;z-index:9999;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  header{display:flex;align-items:center;gap:14px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border-subtle);height:56px}
  .brand{font-family:var(--font-serif);font-size:18px;letter-spacing:.02em;white-space:nowrap}
  .brand em{color:var(--accent);font-style:normal}
  .vdiv{width:1px;height:20px;background:var(--border-subtle)}
  .proj{font-size:12px;color:var(--text-2);background:var(--elevated);border:1px solid var(--border-subtle);padding:4px 10px;border-radius:999px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
  #search{flex:1;max-width:240px;margin-left:auto;background:var(--elevated);border:1px solid var(--border-subtle);border-radius:8px;color:var(--text-1);font-size:13px;padding:7px 12px}
  #search::placeholder{color:var(--text-3)}
  .langpill{display:flex;background:var(--elevated);border:1px solid var(--border-subtle);border-radius:8px;padding:2px}
  .langpill button{font-size:12px;padding:4px 9px;border-radius:6px;color:var(--text-2)}
  .langpill button.on{background:rgba(212,165,116,.15);color:var(--accent)}
  .btn-tour{font-size:13px;font-weight:500;color:var(--accent);background:rgba(212,165,116,.1);border:1px solid var(--border-medium);border-radius:8px;padding:7px 14px;white-space:nowrap;transition:background .15s}
  .btn-tour:hover{background:rgba(212,165,116,.2)}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(212,165,116,.45)}50%{box-shadow:0 0 0 9px rgba(212,165,116,0)}}
  body.intro .btn-tour{animation:pulse 1.8s infinite;background:var(--accent);color:#0a0a0a}

  .main{display:flex;height:calc(100% - 56px)}
  .canvas-wrap{flex:1;overflow:auto;position:relative}
  .canvas{position:relative;height:100%;min-height:580px}

  .lane{position:absolute;left:0;right:0;border-bottom:1px dashed var(--border-subtle)}
  .lane-label{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;writing-mode:vertical-rl;opacity:.85}
  #lane-fe{top:0;height:160px}     #lane-fe .lane-label{color:var(--lane-fe)}
  #lane-be{top:160px;height:200px} #lane-be .lane-label{color:var(--lane-be)}
  #lane-db{top:360px;height:200px;border-bottom:none} #lane-db .lane-label{color:var(--lane-db)}

  svg.edges{position:absolute;top:0;left:0;height:100%;pointer-events:none}
  .edge{stroke:rgba(212,165,116,.3);stroke-width:1.5;fill:none;transition:stroke .2s,opacity .3s}
  .edge.up{stroke:var(--up);stroke-width:2}
  .edge.down{stroke:var(--accent);stroke-width:2}
  body.intro .edge{opacity:.12}

  .node{position:absolute;width:180px;background:var(--panel);border:1px solid var(--border-subtle);border-radius:10px;padding:10px 12px;transition:border-color .15s,opacity .3s,box-shadow .15s;text-align:left}
  .node:hover{border-color:var(--border-medium)}
  .node.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 24px rgba(212,165,116,.15)}
  .node.up-hl{border-color:var(--up);box-shadow:0 0 0 1px var(--up)}
  .node.down-hl{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .node.dim{opacity:.22}
  body.intro .node{opacity:.15}
  .node-head{display:flex;align-items:center;gap:7px}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .node-name{font-size:13.5px;font-weight:600;flex:1}
  .tag-tradeoff{font-size:9px;font-weight:600;letter-spacing:.08em;color:var(--accent);border:1px solid var(--border-medium);border-radius:4px;padding:1px 5px}
  .node-tool{margin-top:6px;font-family:var(--font-mono);font-size:10.5px;color:var(--text-2);background:var(--elevated);border-radius:5px;padding:3px 7px;display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .legend{position:absolute;left:20px;bottom:16px;display:none;gap:14px;font-size:11px;color:var(--text-2);background:var(--glass);border:1px solid var(--border-subtle);border-radius:8px;padding:7px 12px;backdrop-filter:blur(8px);z-index:5}
  .legend.on{display:flex}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:-1px}

  aside{width:350px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border-subtle);display:flex;flex-direction:column;overflow:hidden}
  .tourbar{display:none;align-items:center;gap:8px;padding:9px 14px;background:rgba(212,165,116,.07);border-bottom:1px solid var(--border-medium);font-size:12px}
  .tourbar.on{display:flex}
  .tourbar .step{font-family:var(--font-mono);color:var(--accent);white-space:nowrap}
  .tourbar .hint{flex:1;color:var(--text-2);line-height:1.4}
  .tourbar button{color:var(--accent);font-size:12px;padding:3px 8px;border:1px solid var(--border-medium);border-radius:6px;white-space:nowrap}
  .tourbar button:disabled{opacity:.35;cursor:default}
  #tourNext{background:var(--accent);color:#0a0a0a;font-weight:600;animation:pulse 1.8s infinite}
  #tourNext:disabled{animation:none;background:var(--elevated);color:var(--text-3)}
  .panel-scroll{flex:1;overflow-y:auto;padding:20px 18px 16px}
  .panel-scroll::-webkit-scrollbar{width:8px}
  .panel-scroll::-webkit-scrollbar-thumb{background:rgba(212,165,116,.2);border-radius:4px}

  h2.pname{font-family:var(--font-serif);font-size:21px;font-weight:400;letter-spacing:.01em}
  .badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .badge{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--border-subtle);background:var(--elevated);color:var(--text-2)}
  .badge.tool{font-family:var(--font-mono);color:var(--accent-bright);border-color:var(--border-medium)}
  .role{margin-top:12px;font-size:13px;line-height:1.65;color:var(--text-1);border-left:2px solid var(--accent);padding-left:11px}

  .sec{margin-top:22px}
  .sec-title{font-size:11px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--accent);margin-bottom:9px}
  .impact li{list-style:none;position:relative;padding-left:16px;font-size:13px;line-height:1.65;color:var(--text-1);margin-bottom:7px}
  .impact li::before{content:'—';position:absolute;left:0;color:var(--accent)}
  .how{font-size:13px;line-height:1.7;color:var(--text-1)}
  .fail{margin-top:10px;font-size:12.5px;line-height:1.6;color:var(--text-2)}
  .fail b{color:var(--warn);font-weight:600}

  .dep-row{display:flex;align-items:baseline;gap:8px;font-size:12.5px;margin-bottom:8px}
  .dep-key{color:var(--text-3);white-space:nowrap;min-width:64px;flex-shrink:0}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--elevated);border:1px solid var(--border-subtle);color:var(--text-1);transition:border-color .15s}
  .chip:hover{border-color:var(--accent)}
  .chip.none{color:var(--text-3);border-style:dashed;cursor:default}

  .code-toggle{width:100%;display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--text-2);background:var(--elevated);border:1px solid var(--border-subtle);border-radius:8px;padding:9px 12px;transition:border-color .15s}
  .code-toggle:hover{border-color:var(--border-medium)}
  .code-toggle .arrow{transition:transform .2s;color:var(--accent)}
  .code-body{display:none;margin-top:10px}
  .code-open .code-body{display:block}
  .code-open .arrow{transform:rotate(90deg)}
  .cblock{margin-bottom:14px}
  .cblock pre{font-family:var(--font-mono);font-size:11.5px;line-height:1.6;color:#cfc6ba;background:#0d0d0d;border:1px solid var(--border-subtle);border-radius:8px 8px 0 0;padding:10px 12px;overflow-x:auto}
  .cblock .note{font-size:12px;line-height:1.6;color:var(--text-2);background:rgba(212,165,116,.05);border:1px solid var(--border-subtle);border-top:none;padding:8px 12px}
  .cblock .note:last-child{border-radius:0 0 8px 8px}
  .cblock .risk{font-size:12px;line-height:1.6;color:var(--warn);background:rgba(212,160,48,.06);border:1px solid rgba(212,160,48,.3);border-top:none;border-radius:0 0 8px 8px;padding:8px 12px}
  .no-code{font-size:12.5px;color:var(--text-3);font-style:italic}

  .tradeoff{background:rgba(212,165,116,.05);border:1px solid var(--border-medium);border-radius:10px;padding:13px 14px}
  .tradeoff p{font-size:12.5px;line-height:1.6;margin-bottom:7px}
  .tradeoff p:last-child{margin-bottom:0}
  .tradeoff b{color:var(--accent-bright);font-weight:600}

  .panel-foot{padding:12px 18px;border-top:1px solid var(--border-subtle)}
  .btn-hl{width:100%;font-size:13px;font-weight:500;color:var(--accent);background:rgba(212,165,116,.1);border:1px solid var(--border-medium);border-radius:8px;padding:10px;transition:background .15s}
  .btn-hl:hover{background:rgba(212,165,116,.2)}
  .btn-hl.active{background:var(--accent);color:#0a0a0a}

  .ov-stats{display:flex;gap:8px;margin-top:22px}
  .stat{flex:1;background:var(--elevated);border:1px solid var(--border-subtle);border-radius:9px;padding:10px;text-align:center}
  .stat .n{font-family:var(--font-serif);font-size:20px;color:var(--accent)}
  .stat .l{font-size:10.5px;color:var(--text-3);margin-top:2px}
  .ov-hint{margin-top:18px;font-size:12.5px;color:var(--text-3);line-height:1.6}

  /* onboarding modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border-medium);border-radius:14px;padding:26px 24px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .modal h1{font-family:var(--font-serif);font-size:24px;font-weight:400}
  .modal h1 em{color:var(--accent);font-style:normal}
  .modal .sub{margin-top:8px;font-size:13px;color:var(--text-2);line-height:1.6}
  .m-label{margin-top:20px;font-size:11px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--accent)}
  .m-langs{display:flex;gap:8px;margin-top:9px}
  .m-langs button{flex:1;font-size:13px;padding:9px;border:1px solid var(--border-subtle);border-radius:8px;background:var(--elevated);color:var(--text-2)}
  .m-langs button.on{border-color:var(--accent);color:var(--accent);background:rgba(212,165,116,.08)}
  #repoUrl{width:100%;margin-top:9px;background:var(--elevated);border:1px solid var(--border-subtle);border-radius:8px;color:var(--text-1);font-size:13px;padding:9px 12px;font-family:var(--font-mono)}
  #repoUrl::placeholder{color:var(--text-3);font-family:var(--font-sans)}
  .m-note{margin-top:7px;font-size:11.5px;color:var(--text-3);line-height:1.5}
  .m-actions{display:flex;gap:8px;margin-top:18px}
  .m-actions button{flex:1;font-size:13px;font-weight:500;padding:10px;border-radius:8px}
  #btnAnalyze{background:var(--accent);color:#0a0a0a}
  #btnAnalyze:disabled{background:var(--elevated);color:var(--text-3);cursor:default}
  #btnDemo{border:1px solid var(--border-medium);color:var(--accent)}
  .m-status{margin-top:12px;font-size:12px;color:var(--text-2);min-height:16px;line-height:1.5}
  .m-status.err{color:#e05252}

  @media (max-width:980px){
    .main{flex-direction:column}
    aside{width:100%;height:46%;border-left:none;border-top:1px solid var(--border-subtle)}
    #search{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body class="intro">

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h1 id="mTitle"></h1>
    <p class="sub" id="mSub"></p>
    <div class="m-label" id="mLangLabel"></div>
    <div class="m-langs">
      <button id="mEn" class="on">English</button>
      <button id="mZh">中文</button>
    </div>
    <div class="m-label" id="mRepoLabel"></div>
    <input id="repoUrl" type="text" placeholder="https://github.com/owner/repo" />
    <p class="m-note" id="mNote"></p>
    <div class="m-actions">
      <button id="btnAnalyze"></button>
      <button id="btnDemo"></button>
    </div>
    <p class="m-status" id="mStatus"></p>
  </div>
</div>

<header>
  <div class="brand" id="hBrand"></div>
  <div class="vdiv"></div>
  <div class="proj" id="hProj"></div>
  <input id="search" type="text" />
  <div class="langpill">
    <button id="pillEn" class="on">EN</button>
    <button id="pillZh">中文</button>
  </div>
  <button class="btn-tour" id="btnTour"></button>
</header>

<div class="main">
  <div class="canvas-wrap">
    <div class="canvas" id="canvas">
      <div class="lane" id="lane-fe"><span class="lane-label" id="llfe"></span></div>
      <div class="lane" id="lane-be"><span class="lane-label" id="llbe"></span></div>
      <div class="lane" id="lane-db"><span class="lane-label">Database</span></div>
      <svg class="edges" id="edges">
        <defs>
          <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0 L8,4 L0,8 z" fill="rgba(212,165,116,.5)"/>
          </marker>
        </defs>
        <g id="edgeG"></g>
      </svg>
      <div class="legend" id="legend"><span id="legUp"></span><span id="legDn"></span></div>
    </div>
  </div>

  <aside>
    <div class="tourbar" id="tourbar">
      <span class="step" id="tourStep"></span>
      <span class="hint" id="tourHint"></span>
      <button id="tourPrev"></button>
      <button id="tourNext"></button>
      <button id="tourExit"></button>
    </div>
    <div class="panel-scroll" id="panel"></div>
    <div class="panel-foot" id="panelFoot" style="display:none">
      <button class="btn-hl" id="btnHl"></button>
    </div>
  </aside>
</div>

            "zh": "成品页面只挂三样东西:标题、本地样式、本地互动引擎——后两样就躺在同一个文件夹里。"
          },
          "risk": null
        }
      ],
      "tradeoff": null,
      "tourHint": {
        "en": "Stop 8 · The finish line: a complete course you can send to a friend.",
        "zh": "第 8 站 · 终点:一门完整的课程,可以直接发给朋友。"
      }
    }
  },
  "diff": {
    "changed": [],
    "affected": []
  }
};

/* ---------- state ---------- */
var lang = "en";
var DATA = DEMO;               // current dataset (demo or generated)
var CHAIN = DATA.chain;
var selected = null, hlActive = false, tourOn = false, tourIdx = 0;
var NODE_W = 180, LANE_Y = {fe:60, be:255, db:440};

function L(v){ if(v==null) return ""; return (typeof v==="object" && ("en" in v||"zh" in v)) ? (v[lang]!=null?v[lang]:(v.en||v.zh)) : v; }
function S(){ return STR[lang]; }
function el(id){ return document.getElementById(id); }

/* ---------- canvas ---------- */
function nodePos(id){ var i = CHAIN.indexOf(id); return {x: 50 + i*210, y: LANE_Y[DATA.nodes[id].lane] || LANE_Y.be}; }
function edgePath(a,b){
  var sx=a.x+NODE_W, sy=a.y+33, tx=b.x, ty=b.y+33;
  if (sy===ty) return "M"+sx+","+sy+" L"+tx+","+ty;
  var mx=(sx+tx)/2;
  return "M"+sx+","+sy+" C"+mx+","+sy+" "+mx+","+ty+" "+tx+","+ty;
}
function buildCanvas(){
  document.querySelectorAll(".node").forEach(function(n){n.remove()});
  var g = el("edgeG"); g.innerHTML = "";
  var w = 50 + CHAIN.length*210 + 40;
  el("canvas").style.minWidth = w+"px";
  el("edges").style.width = w+"px";
  CHAIN.forEach(function(id){
    var n = DATA.nodes[id], p = nodePos(id);
    var e = document.createElement("button");
    e.className = "node"; e.id = "n-"+id;
    e.style.left = p.x+"px"; e.style.top = p.y+"px";
    e.innerHTML = '<div class="node-head"><span class="dot" style="background:var(--lane-'+(n.lane||"be")+')"></span>'+
      '<span class="node-name">'+L(n.name)+'</span>'+
      (n.tradeoff ? '<span class="tag-tradeoff">'+S().tag+'</span>' : '')+'</div>'+
      '<span class="node-tool">'+(n.tool||"")+'</span>';
    e.addEventListener("click", function(){ wake(); selectNode(id); });
    el("canvas").appendChild(e);
  });
  for (var i=0;i<CHAIN.length-1;i++){
    var p = document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("class","edge"); p.setAttribute("id","e"+i);
    p.setAttribute("d", edgePath(nodePos(CHAIN[i]), nodePos(CHAIN[i+1])));
    p.setAttribute("marker-end","url(#arr)");
    g.appendChild(p);
  }
}

/* ---------- panel: overview ---------- */
function overviewHtml(){
  var pj = DATA.project, s = S();
  var trades = CHAIN.filter(function(id){return DATA.nodes[id].tradeoff}).length;
  var lanes = {}; CHAIN.forEach(function(id){lanes[DATA.nodes[id].lane]=1});
  function sec(t,c){ return c ? '<div class="sec"><div class="sec-title">'+t+'</div><p class="how">'+c+'</p></div>' : ""; }
  return '<h2 class="pname">'+L(pj.name)+'</h2>'+
    sec(s.scen, L(pj.scenario)) + sec(s.pain, L(pj.pain)) + sec(s.now, L(pj.now)) +
    '<div class="ov-stats">'+
      '<div class="stat"><div class="n">'+CHAIN.length+'</div><div class="l">'+s.parts+'</div></div>'+
      '<div class="stat"><div class="n">'+Object.keys(lanes).length+'</div><div class="l">'+s.layers+'</div></div>'+
      '<div class="stat"><div class="n">'+trades+'</div><div class="l">'+s.trades+'</div></div>'+
    '</div>'+
    '<p class="ov-hint">'+s.ovHint+'</p>';
}
function renderOverview(){ panel.innerHTML = overviewHtml(); el("panelFoot").style.display = "none"; }

/* ---------- panel: node ---------- */
function chipsHtml(ids, emptyText){
  if (!ids || !ids.length) return '<span class="chip none">'+emptyText+'</span>';
  return ids.filter(function(i){return DATA.nodes[i]}).map(function(i){
    return '<button class="chip" data-go="'+i+'">'+L(DATA.nodes[i].name)+'</button>';
  }).join("") || '<span class="chip none">'+emptyText+'</span>';
}
function renderNode(id){
  var n = DATA.nodes[id], s = S(), station = CHAIN.indexOf(id)+1;
  var html = '<h2 class="pname">'+L(n.name)+'</h2>'+
    '<div class="badges"><span class="badge tool">'+(n.tool||"")+'</span>'+
    '<span class="badge">'+(n.lane==="db" ? "Database" : s["lane_"+n.lane])+'</span>'+
    '<span class="badge">'+s.stopOf(station, CHAIN.length)+'</span></div>'+
    '<p class="role">'+L(n.role)+'</p>';
  if (n.impact && n.impact.length)
    html += '<div class="sec"><div class="sec-title">'+s.impact+'</div><ul class="impact">'+
      n.impact.map(function(i){return '<li>'+L(i)+'</li>'}).join("")+'</ul></div>';
  html += '<div class="sec"><div class="sec-title">'+s.how+'</div><p class="how">'+L(n.how)+'</p>'+
    (n.fail ? '<p class="fail"><b>'+s.broke+'</b>'+L(n.fail)+'</p>' : "")+'</div>'+
    '<div class="sec"><div class="sec-title">'+s.deps+'</div>'+
    '<div class="dep-row"><span class="dep-key">'+s.needs+'</span><span class="chips">'+chipsHtml(n.needs,s.isStart)+'</span></div>'+
    '<div class="dep-row"><span class="dep-key">'+s.feeds+'</span><span class="chips">'+chipsHtml(n.feeds,s.isEnd)+'</span></div></div>';
  if (n.code && n.code.length){
    var lines = n.code.reduce(function(a,b){return a + String(b.c||"").split("\n").length},0);
    html += '<div class="sec" id="codeSec"><button class="code-toggle" id="codeToggle">'+
      '<span>'+s.code(lines)+'</span><span class="arrow">›</span></button><div class="code-body">'+
      n.code.map(function(b){return '<div class="cblock"><pre></pre><div class="note">'+L(b.n)+'</div>'+
        (b.risk ? '<div class="risk">'+L(b.risk)+'</div>' : "")+'</div>'}).join("")+'</div></div>';
  } else {
    html += '<div class="sec"><div class="sec-title">'+s.code(0).replace(/\s*[（(]0.*$/,"")+'</div><p class="no-code">'+s.noCode+'</p></div>';
  }
  if (n.tradeoff){
    html += '<div class="sec"><div class="sec-title">'+s.trade+'</div><div class="tradeoff">'+
      '<p>'+s.chose+' <b>'+L(n.tradeoff.a)+'</b>'+(lang==="zh"?"，":", ")+s.over+' <b>'+L(n.tradeoff.b)+'</b>'+(lang==="zh"?"。":".")+'</p>'+
      '<p><b>'+s.cost+'</b>'+L(n.tradeoff.cost)+'</p>'+
      '<p><b>'+s.when+'</b>'+L(n.tradeoff.when)+'</p></div></div>';
  }
  panel.innerHTML = html; panel.scrollTop = 0;
  if (n.code && n.code.length){
    var pres = panel.querySelectorAll(".cblock pre");
    n.code.forEach(function(b,i){ pres[i].textContent = b.c; });
    el("codeToggle").addEventListener("click", function(){ el("codeSec").classList.toggle("code-open"); });
  }
  panel.querySelectorAll(".chip[data-go]").forEach(function(c){
    c.addEventListener("click", function(){ selectNode(c.dataset.go); });
  });
  el("panelFoot").style.display = "block";
}

/* ---------- select / highlight ---------- */
var panel = el("panel"), btnHl = el("btnHl"), legend = el("legend");
function selectNode(id){
  selected = id;
  document.querySelectorAll(".node").forEach(function(e){e.classList.remove("selected")});
  var t = el("n-"+id); if (t) t.classList.add("selected");
  renderNode(id);
  if (hlActive) applyHighlight();
}
function applyHighlight(){
  var idx = CHAIN.indexOf(selected);
  CHAIN.forEach(function(id,i){
    var e = el("n-"+id); e.classList.remove("up-hl","down-hl","dim");
    if (i<idx) e.classList.add("up-hl"); else if (i>idx) e.classList.add("down-hl");
  });
  for (var i=0;i<CHAIN.length-1;i++){
    var e = el("e"+i); e.classList.remove("up","down");
    e.classList.add(i<idx ? "up" : "down");
  }
  legend.classList.add("on"); btnHl.classList.add("active"); btnHl.textContent = S().unhl;
}
function clearHighlight(){
  document.querySelectorAll(".node").forEach(function(e){e.classList.remove("up-hl","down-hl","dim")});
  document.querySelectorAll(".edge").forEach(function(e){e.classList.remove("up","down")});
  legend.classList.remove("on"); btnHl.classList.remove("active"); btnHl.textContent = S().hl;
}
btnHl.addEventListener("click", function(){ hlActive = !hlActive; hlActive ? applyHighlight() : clearHighlight(); });

/* ---------- intro / wake ---------- */
function wake(){ document.body.classList.remove("intro"); }

/* ---------- search ---------- */
el("search").addEventListener("input", function(e){
  wake();
  var q = e.target.value.trim().toLowerCase();
  CHAIN.forEach(function(id){
    var n = DATA.nodes[id];
    var hit = !q || L(n.name).toLowerCase().indexOf(q)>=0 || String(n.tool||"").toLowerCase().indexOf(q)>=0;
    el("n-"+id).classList.toggle("dim", !hit);
  });
});

/* ---------- tour (step 0 = summary) ---------- */
var tourbar = el("tourbar");
function tourGo(i){
  tourIdx = i; var s = S(); var total = CHAIN.length;
  el("tourPrev").disabled = i===0;
  el("tourNext").disabled = i===total;
  if (i===0){
    el("tourStep").textContent = s.intro;
    el("tourHint").textContent = s.sumHint;
    selected = null; hlActive = false; clearHighlight();
    document.querySelectorAll(".node").forEach(function(e){e.classList.remove("selected")});
    renderOverview();
  } else {
    wake();
    var id = CHAIN[i-1];
    el("tourStep").textContent = i+"/"+total;
    el("tourHint").textContent = L(DATA.nodes[id].tourHint) || "";
    hlActive = true; selectNode(id);
  }
}
el("btnTour").addEventListener("click", function(){ tourOn = true; tourbar.classList.add("on"); tourGo(0); });
el("tourPrev").addEventListener("click", function(){ tourGo(tourIdx-1); });
el("tourNext").addEventListener("click", function(){ tourGo(tourIdx+1); });
el("tourExit").addEventListener("click", function(){ tourOn=false; tourbar.classList.remove("on"); hlActive=false; clearHighlight(); wake(); });
document.addEventListener("keydown", function(e){
  if (e.key==="Escape"){ if(tourOn){tourOn=false;tourbar.classList.remove("on")} hlActive=false; clearHighlight(); }
});

/* ---------- language ---------- */
function applyLang(){
  var s = S();
  el("hBrand").innerHTML = s.brand;
  el("hProj").textContent = L(DATA.project.name);
  el("search").placeholder = s.search;
  el("btnTour").textContent = s.tour;
  el("tourPrev").textContent = s.prev; el("tourNext").textContent = s.next; el("tourExit").textContent = s.exit;
  el("llfe").textContent = s.lane_fe; el("llbe").textContent = s.lane_be;
  el("legUp").innerHTML = s.legUp; el("legDn").innerHTML = s.legDn;
  el("mTitle").innerHTML = s.mTitle; el("mSub").textContent = s.mSub;
  el("mLangLabel").textContent = s.mLang; el("mRepoLabel").textContent = s.mRepo;
  el("mNote").textContent = s.mNote; el("btnAnalyze").textContent = s.analyze; el("btnDemo").textContent = s.demo;
  btnHl.textContent = hlActive ? s.unhl : s.hl;
  el("pillEn").classList.toggle("on", lang==="en"); el("pillZh").classList.toggle("on", lang==="zh");
  el("mEn").classList.toggle("on", lang==="en"); el("mZh").classList.toggle("on", lang==="zh");
  document.documentElement.lang = lang==="zh" ? "zh-CN" : "en";
  buildCanvas();
  if (tourOn) tourGo(tourIdx);
  else if (selected) selectNode(selected);
  else renderOverview();
}
function setLang(l){ lang = l; applyLang(); }
el("pillEn").addEventListener("click", function(){setLang("en")});
el("pillZh").addEventListener("click", function(){setLang("zh")});
el("mEn").addEventListener("click", function(){setLang("en")});
el("mZh").addEventListener("click", function(){setLang("zh")});

/* ---------- GitHub analysis ---------- */
function status(msg, err){ var m = el("mStatus"); m.textContent = msg||""; m.classList.toggle("err", !!err); }
function ghHeaders(){ return {"Accept":"application/vnd.github.raw"}; }
function normalizeGenerated(j){
  // wrap plain strings so L() works, keep structure defensive
  function W(v){ return v==null ? "" : v; }
  var nodes = {};
  (j.chain||[]).forEach(function(id){
    var n = (j.nodes||{})[id]; if(!n) return;
    nodes[id] = { lane: (n.lane==="fe"||n.lane==="db") ? n.lane : "be",
      tool: W(n.tool), grade: n.grade||"routine",
      needs: n.needs||[], feeds: n.feeds||[],
      name: W(n.name)||id, role: W(n.role), impact: (n.impact||[]).slice(0,3),
      how: W(n.how), fail: W(n.fail),
      code: (n.code||[]).slice(0,2).map(function(b){return {c:W(b.c), n:W(b.n), risk:b.risk?W(b.risk):null}}),
      tradeoff: n.tradeoff ? {a:W(n.tradeoff.a), b:W(n.tradeoff.b), cost:W(n.tradeoff.cost), when:W(n.tradeoff.when)} : null,
      tourHint: W(n.tourHint) };
  });
  var chain = (j.chain||[]).filter(function(id){return nodes[id]});
  if (chain.length < 2) throw new Error("chain too short");
  return { chain: chain, nodes: nodes,
    project: { name: W((j.project||{}).name)||"Your project",
      scenario: W((j.project||{}).scenario), pain: W((j.project||{}).pain), now: W((j.project||{}).now) } };
}
function buildPrompt(files){
  var langName = lang==="zh" ? "Simplified Chinese" : "English";
  return "You explain a codebase to its owner, a vibe coder with zero CS background. Rules: every 'role' states the component's specific job in THIS project (never a generic analogy); 'impact' bullets are user-facing (money, speed, future flexibility), max 2; 'how' is max 3 short sentences, define any jargon in parentheses on first use; 'fail' is 1 sentence on what happens when it breaks; 'code' is at most 1 block of 3-8 real lines from the repo with a 1-sentence plain note, add 'risk' only for lines that call external APIs, write to a database, or are hard to reverse; 'tradeoff' (chose a over b, cost, when to switch) ONLY for consequential decisions, else null. Write ALL human-readable strings in " + langName + ". Keep every string short.\n\n" +
  "Respond with ONLY valid JSON, no markdown fences, exactly this shape:\n" +
  '{"project":{"name":"","scenario":"","pain":"","now":""},"chain":["id1","id2"],"nodes":{"id1":{"lane":"fe|be|db","tool":"","grade":"routine|consequential","needs":[],"feeds":["id2"],"name":"","role":"","impact":[""],"how":"","fail":"","code":[{"c":"","n":"","risk":null}],"tradeoff":null,"tourHint":""}}}\n\n' +
  "chain = the main data flow, 4 to 6 parts, ordered. lane: fe=what users see, be=logic, db=any storage or cloud data (localStorage, files, S3, Supabase all count as db). project.scenario and project.pain must come from the README or code comments; if the repo does not state them, use an empty string — NEVER invent business context.\n\nRepo files:\n" + files;
}
async function analyzeRepo(){
  var url = el("repoUrl").value.trim();
  var m = url.match(/github\.com\/([^\/\s]+)\/([^\/\s#?]+)/);
  if (!m){ status(S().eUrl, true); return; }
  var owner = m[1], repo = m[2].replace(/\.git$/,"");
  el("btnAnalyze").disabled = true;
  try{
    status(S().sFetchList);
    var meta = await (await fetch("https://api.github.com/repos/"+owner+"/"+repo)).json();
    if (!meta || !meta.default_branch) throw new Error("repo");
    var tree = await (await fetch("https://api.github.com/repos/"+owner+"/"+repo+"/git/trees/"+meta.default_branch+"?recursive=1")).json();
    var all = (tree.tree||[]).filter(function(f){return f.type==="blob"});
    var prio = ["package.json","readme.md","readme","requirements.txt","pyproject.toml","vite.config","next.config","serverless","docker-compose","schema.prisma","supabase",".env.example","src/main","src/index","src/app","app.py","main.py","server","api/"];
    var picked = [];
    prio.forEach(function(p){
      all.forEach(function(f){
        if (picked.length>=8) return;
        if (f.path.toLowerCase().indexOf(p)>=0 && picked.indexOf(f.path)<0 && (f.size||0)<60000) picked.push(f.path);
      });
    });
    if (!picked.length) picked = all.slice(0,5).map(function(f){return f.path});
    status(S().sFetchFiles + " ("+picked.length+")");
    var texts = [];
    for (var i=0;i<picked.length;i++){
      try{
        var r = await fetch("https://api.github.com/repos/"+owner+"/"+repo+"/contents/"+picked[i], {headers: ghHeaders()});
        if (r.ok){ var t = await r.text(); texts.push("=== "+picked[i]+" ===\n"+t.slice(0,3500)); }
      }catch(e){}
    }
    if (!texts.length) throw new Error("repo");
    status(S().sAsk);
    var resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000,
        messages:[{role:"user", content: buildPrompt(texts.join("\n\n").slice(0,26000))}] })
    });
    var data = await resp.json();
    var text = (data.content||[]).filter(function(b){return b.type==="text"}).map(function(b){return b.text}).join("\n");
    var clean = text.replace(/```json|```/g,"").trim();
    var parsed = normalizeGenerated(JSON.parse(clean));
    DATA = parsed; CHAIN = DATA.chain;
    selected = null; hlActive = false; tourOn = false; tourbar.classList.remove("on");
    el("modalBg").style.display = "none";
    document.body.classList.add("intro");
    applyLang();
    status("");
  }catch(err){
    status(String(err).indexOf("repo")>=0 ? S().eRepo : S().eGen, true);
  }
  el("btnAnalyze").disabled = false;
}
el("btnAnalyze").addEventListener("click", analyzeRepo);
el("btnDemo").addEventListener("click", function(){
  DATA = DEMO; CHAIN = DATA.chain;
  el("modalBg").style.display = "none";
  document.body.classList.add("intro");
  applyLang();
});

/* ---------- boot ---------- */
applyLang();
renderOverview();
</script>
</body>
